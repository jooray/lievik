<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lievik - Marketing Content Orchestrator{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>
<body>
    {% if not hide_header %}
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('main.index') }}" class="logo">
                    🌱 Lievik
                </a>
                <nav class="nav-links">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('main.index') }}" class="nav-link">Dashboard</a>
                        <a href="#" class="nav-link">Channels</a>
                        <a href="#" class="nav-link">Content</a>
                        <a href="{{ url_for('main.logout') }}" class="nav-link">Logout</a>
                    {% else %}
                        <a href="{{ url_for('main.login') }}" class="nav-link">Login</a>
                        <a href="{{ url_for('main.register') }}" class="nav-link">Register</a>
                    {% endif %}
                </nav>
            </div>
        </div>
    </header>
    {% endif %}

    <!-- Global Status Notification Area -->
    <div id="status-notification" class="status-notification" style="display: none;">
        <div class="status-content">
            <span class="status-icon"></span>
            <span class="status-message"></span>
            <button class="status-close" onclick="hideStatusNotification()">&times;</button>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Global Status Notification Scripts -->
    <script>
        // Global status notification functions
        function showStatusNotification(message, type = 'success') {
            const notification = document.getElementById('status-notification');
            const messageEl = notification.querySelector('.status-message');

            // Set message and type
            messageEl.textContent = message;
            notification.className = `status-notification ${type}`;
            notification.style.display = 'block';

            // Auto-hide after 8 seconds for success/warning, keep error visible
            if (type !== 'error') {
                setTimeout(() => {
                    hideStatusNotification();
                }, 8000);
            }
        }

        function hideStatusNotification() {
            const notification = document.getElementById('status-notification');
            notification.style.display = 'none';
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
