<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lievik - Marketing Content Orchestrator{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block head %}{% endblock %}
</head>
<body>
    {% if not hide_header %}
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('main.index') }}" class="logo">
                    🌱 Lievik
                </a>
                <nav class="nav-links">
                    {% if current_user.is_authenticated %}
                        <a href="{{ url_for('main.index') }}" class="nav-link">Dashboard</a>
                        <a href="#" class="nav-link">Channels</a>
                        <a href="#" class="nav-link">Content</a>
                        <a href="{{ url_for('main.logout') }}" class="nav-link">Logout</a>
                    {% else %}
                        <a href="{{ url_for('main.login') }}" class="nav-link">Login</a>
                        <a href="{{ url_for('main.register') }}" class="nav-link">Register</a>
                    {% endif %}
                </nav>
            </div>
        </div>
    </header>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
