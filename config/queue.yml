default: &default
  dispatchers:
    - polling_interval: 5
      batch_size: 500
  workers:
    - queues: [ "auth" ]
      threads: <%= ENV.fetch("AUTH_JOB_CONCURRENCY", 1) %>
      processes: <%= ENV.fetch("AUTH_JOB_PROCESSES", 1) %>
      polling_interval: 1
    # `solid_queue_recurring` is where SolidQueue::RecurringJob lands — every
    # `command:` entry in recurring.yml is wrapped in one. (Entries with
    # `class:` are enqueued as that class, so they land on `default`.) Leaving
    # it off this list silently strands the whole command-based half of the
    # schedule: the jobs enqueue forever and nothing ever claims them.
    #
    # Must be a YAML *list*. Solid Queue does `Array(options[:queues])`, which
    # turns the string "default,solid_queue_recurring" into one bogus queue name
    # containing a comma rather than into two names — the worker then matches
    # nothing at all.
    - queues: [ "default", "solid_queue_recurring" ]
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 5
  scheduler:
    polling_interval: 30
    recurring_tasks: config/recurring.yml

development:
  <<: *default

test:
  <<: *default
  scheduler: null

production:
  <<: *default
